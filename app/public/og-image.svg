<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#FFD5E5"/>
      <stop offset="25%" stop-color="#FFE9C2"/>
      <stop offset="50%" stop-color="#FFF6B3"/>
      <stop offset="75%" stop-color="#C7F0DA"/>
      <stop offset="100%" stop-color="#C5E8F8"/>
    </linearGradient>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FF2D8A"/>
      <stop offset="25%"  stop-color="#FFB400"/>
      <stop offset="50%"  stop-color="#2BB673"/>
      <stop offset="75%"  stop-color="#4FB6E6"/>
      <stop offset="100%" stop-color="#E63946"/>
    </linearGradient>
    <filter id="logoShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="0" flood-color="rgba(0,0,0,0.18)"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="rgba(0,0,0,0.12)"/>
    </filter>
    <style>
      .logo {
        font-family: 'Yu Gothic UI', 'Meiryo', 'Hiragino Sans', sans-serif;
        font-weight: 900;
        font-size: 112px;
        letter-spacing: -0.01em;
        paint-order: stroke fill;
        stroke: #ffffff;
        stroke-width: 8;
        stroke-linejoin: round;
      }
      .sub {
        font-family: 'Yu Gothic UI', 'Meiryo', 'Hiragino Sans', sans-serif;
        font-weight: 700;
        font-size: 30px;
        fill: #2A4A6E;
      }
      .card-title {
        font-family: 'Yu Gothic UI', 'Meiryo', 'Hiragino Sans', sans-serif;
        font-weight: 800;
        font-size: 28px;
        fill: #ffffff;
        paint-order: stroke fill;
        stroke: rgba(0,0,0,0.10);
        stroke-width: 1.5;
      }
      .card-cta {
        font-family: 'Yu Gothic UI', 'Meiryo', 'Hiragino Sans', sans-serif;
        font-weight: 700;
        font-size: 16px;
        fill: #ffffff;
      }
      .url {
        font-family: 'Yu Gothic UI', 'Meiryo', 'Hiragino Sans', sans-serif;
        font-weight: 700;
        font-size: 26px;
        fill: #2A4A6E;
        letter-spacing: 0.02em;
      }
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 上下のレインボーライン -->
  <rect x="0" y="0" width="1200" height="8" fill="url(#rainbow)"/>
  <rect x="0" y="622" width="1200" height="8" fill="url(#rainbow)"/>

  <!-- 中央の白カード -->
  <rect x="60" y="60" width="1080" height="510" rx="36" fill="#ffffff" fill-opacity="0.86"/>

  <!-- メインロゴ「ツムツム完売マスター」 -->
  <g filter="url(#logoShadow)">
    <text x="600" y="200" text-anchor="middle" class="logo">
      <tspan fill="#FF2D8A">ツ</tspan><tspan fill="#FFB400">ム</tspan><tspan fill="#2BB673">ツ</tspan><tspan fill="#4FB6E6">ム</tspan><tspan fill="#E63946">完売</tspan><tspan fill="#003B6F">マスター</tspan>
    </text>
  </g>

  <!-- サブテキスト -->
  <text x="600" y="262" text-anchor="middle" class="sub">完売進捗・必要コイン/メダル数を自動算出</text>

  <!-- 4 機能カード -->
  <g filter="url(#cardShadow)">
    <!-- プレミアム＋ -->
    <g transform="translate(120, 320)">
      <rect width="220" height="150" rx="20" fill="#4FB6E6"/>
      <rect x="0" y="0" width="10" height="150" rx="5" fill="#003B6F" fill-opacity="0.25"/>
      <text x="110" y="62" text-anchor="middle" class="card-title">プレミアム＋</text>
      <text x="110" y="92" text-anchor="middle" class="card-title">BOX</text>
      <rect x="40" y="115" width="140" height="22" rx="11" fill="rgba(0,0,0,0.18)"/>
      <text x="110" y="130" text-anchor="middle" class="card-cta">進捗チェック</text>
    </g>
    <!-- プレミアム -->
    <g transform="translate(360, 320)">
      <rect width="220" height="150" rx="20" fill="#E63946"/>
      <rect x="0" y="0" width="10" height="150" rx="5" fill="#5A0A12" fill-opacity="0.25"/>
      <text x="110" y="62" text-anchor="middle" class="card-title">プレミアム</text>
      <text x="110" y="92" text-anchor="middle" class="card-title">BOX</text>
      <rect x="40" y="115" width="140" height="22" rx="11" fill="rgba(0,0,0,0.18)"/>
      <text x="110" y="130" text-anchor="middle" class="card-cta">進捗チェック</text>
    </g>
    <!-- ハピネス -->
    <g transform="translate(600, 320)">
      <rect width="220" height="150" rx="20" fill="#2BB673"/>
      <rect x="0" y="0" width="10" height="150" rx="5" fill="#0E3F26" fill-opacity="0.25"/>
      <text x="110" y="62" text-anchor="middle" class="card-title">ハピネス</text>
      <text x="110" y="92" text-anchor="middle" class="card-title">BOX</text>
      <rect x="40" y="115" width="140" height="22" rx="11" fill="rgba(0,0,0,0.18)"/>
      <text x="110" y="130" text-anchor="middle" class="card-cta">進捗チェック</text>
    </g>
    <!-- 効率計算 -->
    <g transform="translate(840, 320)">
      <rect width="220" height="150" rx="20" fill="#FFB400"/>
      <rect x="0" y="0" width="10" height="150" rx="5" fill="#4A2F00" fill-opacity="0.25"/>
      <text x="110" y="62" text-anchor="middle" class="card-title" fill="#4A2F00" stroke="rgba(255,255,255,0.4)">コイン/メダル</text>
      <text x="110" y="92" text-anchor="middle" class="card-title" fill="#4A2F00" stroke="rgba(255,255,255,0.4)">効率計算</text>
      <rect x="40" y="115" width="140" height="22" rx="11" fill="rgba(0,0,0,0.18)"/>
      <text x="110" y="130" text-anchor="middle" class="card-cta">早見表</text>
    </g>
  </g>

  <!-- URL -->
  <text x="600" y="535" text-anchor="middle" class="url">tsumtsum-master.com</text>
</svg>
